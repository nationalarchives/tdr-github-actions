name: TDR Run git secrets and tests
on:
  workflow_call:
    inputs:
      repo-name:
        required: true
        type: string
      java-version:
        description: "Version of Java required to build project"
        required: false
        type: string
        default: '17'
      test-command:
        required: true
        type: string
    secrets:
      MANAGEMENT_ACCOUNT:
        required: false
      SLACK_WEBHOOK:
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: coursier/cache-action@90c37294538be80a558fd665531fcdc2b467b475 # v8.1.0
      - uses: sbt/setup-sbt@508b753e53cb6095967669e0911487d2b9bc9f41 # v1.1.22
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
      - uses: scalacenter/sbt-dependency-submission@f43202114d7522a4b233e052f82c2eea8d658134 # v3.2.1
        if: contains(inputs.test-command, 'sbt')
      - name: dependency-review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        if: github.event_name == 'pull_request'
        with:
          fail-on-severity: critical
      - name: git-secrets
        uses: nationalarchives/tdr-github-actions/.github/actions/run-git-secrets@b6ba669dcee7fd4ac089c2e9fb234c48ddd93ab5 # v0.0.15
      - name: determine-failure-message
        if: failure()
        id: failure-msg
        run: |
          if [[ "${{ steps.dependency-review.outcome }}" == "failure" ]]; then
            echo "message=:warning: Critical dependency vulnerabilities found in ${{ inputs.repo-name }}" >> $GITHUB_OUTPUT
          elif [[ "${{ steps.git-secrets.outcome }}" == "failure" ]]; then
            echo "message=:warning: Secrets found in repository ${{ inputs.repo-name }}" >> $GITHUB_OUTPUT
          else
            echo "message=:warning: Build failed in repository ${{ inputs.repo-name }}" >> $GITHUB_OUTPUT
          fi
      - uses: nationalarchives/tdr-github-actions/.github/actions/slack-send@b6ba669dcee7fd4ac089c2e9fb234c48ddd93ab5 # v0.0.15
        if: failure()
        with:
          message: ${{ steps.failure-msg.outputs.message }}
          slack-url: ${{ secrets.SLACK_WEBHOOK }}
      - run: ${{ inputs.test-command }}
