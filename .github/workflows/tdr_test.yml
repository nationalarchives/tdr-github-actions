name: TDR Run git secrets and tests
on:
  workflow_call:
    inputs:
      repo-name:
        required: true
        type: string
      java-version:
        description: "Version of Java required to build project"
        required: false
        type: string
        default: '17'
      test-command:
        required: true
        type: string
    secrets:
      MANAGEMENT_ACCOUNT:
        required: false
      SLACK_WEBHOOK:
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: coursier/cache-action@90c37294538be80a558fd665531fcdc2b467b475 # v8.1.0
      - uses: sbt/setup-sbt@93e926cbdb4a428e41b4ef754124ec82925ffdc2 # v1.1.23
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
      - uses: scalacenter/sbt-dependency-submission@f43202114d7522a4b233e052f82c2eea8d658134 # v3.2.1
        if: contains(inputs.test-command, 'sbt')
      - name: dependency-review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        if: github.event_name == 'pull_request'
        with:
          fail-on-severity: critical
      - name: git-secrets
        uses: nationalarchives/tdr-github-actions/.github/actions/run-git-secrets@e7b57a3bdf7863c951cd203101c6d566986376e3 # v0.0.38
      - name: determine-failure-message
        if: failure()
        id: failure-msg
        run: |
          if [[ "${DEPENDENCY_REVIEW_OUTCOME}" == "failure" ]]; then
            echo "message=:warning: Critical dependency vulnerabilities found in ${REPO_NAME}" >> $GITHUB_OUTPUT
          elif [[ "${GIT_SECRETS_OUTCOME}" == "failure" ]]; then
            echo "message=:warning: Secrets found in repository ${REPO_NAME}" >> $GITHUB_OUTPUT
          else
            echo "message=:warning: Build failed in repository ${REPO_NAME}" >> $GITHUB_OUTPUT
          fi
        env:
          REPO_NAME: ${{ inputs.repo-name }}
          DEPENDENCY_REVIEW_OUTCOME: ${{ steps.dependency-review.outcome }}
          GIT_SECRETS_OUTCOME: ${{ steps.git-secrets.outcome }}
      - uses: nationalarchives/tdr-github-actions/.github/actions/slack-send@e7b57a3bdf7863c951cd203101c6d566986376e3 # v0.0.38
        if: failure()
        with:
          message: ${{ steps.failure-msg.outputs.message }}
          slack-url: ${{ secrets.SLACK_WEBHOOK }}
      - name: Run tests
        env:
          TEST_COMMAND: ${{ inputs.test-command }}
        run: eval "$TEST_COMMAND"
