name: TDR Build Lambda
on:
  workflow_call:
    inputs:
      repo-name:
        required: true
        type: string
      build-command:
        required: true
        type: string
      lambda-name:
        required: true
        type: string
      artifact-name:
        required: true
        type: string
      artifact-file-type:
        required: false
        type: string
        default: jar
      artifact-path:
        required: false
        type: string
        default: target/scala-2.13
      java-version:
        description: "Version of Java required to build project"
        required: false
        type: string
        default: '11'
    secrets:
      MANAGEMENT_ACCOUNT:
        required: true
      WORKFLOW_PAT:
        required: true
      WIZ_CLIENT_ID:
        required: false
      WIZ_CLIENT_SECRET:
        required: false
      WIZ_PROJECT_ID:
        required: false
    outputs:
      next-version:
        description: "The next version of the project"
        value: ${{ jobs.pre-deploy.outputs.next-version }}

permissions: {}
jobs:
  pre-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    env:
      WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
      WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
    outputs:
      next-version: ${{ steps.next-tag.outputs.next-version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: coursier/cache-action@90c37294538be80a558fd665531fcdc2b467b475 # v8.1.0
      - uses: sbt/setup-sbt@93e926cbdb4a428e41b4ef754124ec82925ffdc2 # v1.1.23
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
            java-version: ${{ inputs.java-version }}
            distribution: 'temurin'
      - name: Configure AWS credentials from management account
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: arn:aws:iam::${{ secrets.MANAGEMENT_ACCOUNT }}:role/TDRGithubActionsRoleMgmt
          aws-region: eu-west-2
          role-session-name: GitHubActionsRole
      - run: pip install requests
      - id: next-tag
        uses: nationalarchives/tdr-github-actions/.github/actions/get-next-version@8f8b90556173b43554c22d6b5f192fe9f26ad8ab # v0.0.36
        with:
          repo-name: ${{ inputs.repo-name }}
      - name: Download Wiz CLI
        if: contains(inputs.build-command, 'docker')
        run: |
          curl -Lo wizcli https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64
          curl -Lo /tmp/wizcli-sha256 https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64-sha256
          curl -Lo /tmp/wizcli-sha256.sig https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64-sha256.sig
          chmod +x wizcli
      - name: Verify Wiz CLI signature
        if: contains(inputs.build-command, 'docker')
        run: |
          curl -Lo public_key.asc https://downloads.wiz.io/wizcli/public_key.asc
          gpg --import public_key.asc
          gpg --verify /tmp/wizcli-sha256.sig /tmp/wizcli-sha256
          echo "$(cat /tmp/wizcli-sha256) wizcli" | sha256sum --check
      - name: Scan working directory with Wiz
        if: contains(inputs.build-command, 'docker')
        run: ./wizcli scan dir . --name "${REPO_NAME}-${GITHUB_RUN_NUMBER}" --project "${WIZ_PROJECT_ID}"
        env:
          REPO_NAME: ${{ inputs.repo-name }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          WIZ_PROJECT_ID: ${{ secrets.WIZ_PROJECT_ID }}
      - name: Run build command
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_PAT }}
        run: ${{ inputs.build-command }}
      - name: Wiz image tag
        if: contains(inputs.build-command, 'docker')
        run: ./wizcli scan container-image function --project "${WIZ_PROJECT_ID}"
        env:
          WIZ_PROJECT_ID: ${{ secrets.WIZ_PROJECT_ID }}
      - name: Copy artifact to S3 and create release
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          ARTIFACT_PATH: ${{ inputs.artifact-path }}
          ARTIFACT_NAME: ${{ inputs.artifact-name }}
          ARTIFACT_FILE_TYPE: ${{ inputs.artifact-file-type }}
          LAMBDA_NAME: ${{ inputs.lambda-name }}
          NEXT_VERSION: ${{ steps.next-tag.outputs.next-version }}
        run: |
          aws s3 cp "${ARTIFACT_PATH}/${ARTIFACT_NAME}.${ARTIFACT_FILE_TYPE}" "s3://tdr-backend-code-mgmt/${LAMBDA_NAME}/${NEXT_VERSION}/${ARTIFACT_NAME}.${ARTIFACT_FILE_TYPE}"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git tag "${NEXT_VERSION}"
          git push origin "${NEXT_VERSION}"
          gh release create "${NEXT_VERSION}" "${ARTIFACT_PATH}/${ARTIFACT_NAME}.${ARTIFACT_FILE_TYPE}"
