name: TDR ECS Build Images
on:
  workflow_call:
    inputs:
      repo-name:
        required: true
        type: string
      build-command:
        required: false
        type: string
      image-name:
        required: true
        type: string
      java-version:
        description: "Version of Java required to build project"
        required: false
        type: string
        default: '11'
    secrets:
      MANAGEMENT_ACCOUNT:
        required: true
      WORKFLOW_PAT:
        required: true
      WIZ_CLIENT_ID:
        required: true
      WIZ_CLIENT_SECRET:
        required: true
      WIZ_PROJECT_ID:
        required: true
    outputs:
      next-version:
        description: "The next version of the project"
        value: ${{ jobs.pre-deploy.outputs.next-version }}

permissions:
  id-token: write
  contents: write
jobs:
  pre-deploy:
    runs-on: ubuntu-latest
    env:
      WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
      WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
    outputs:
      next-version: ${{ steps.next-tag.outputs.next-version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: coursier/cache-action@90c37294538be80a558fd665531fcdc2b467b475 # v8.1.0
      - uses: sbt/setup-sbt@508b753e53cb6095967669e0911487d2b9bc9f41 # v1.1.22
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
      - name: Configure AWS credentials from management account
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: arn:aws:iam::${{ secrets.MANAGEMENT_ACCOUNT }}:role/TDRGithubActionsRoleMgmt
          aws-region: eu-west-2
          role-session-name: APIDownloadDependencies
      - name: Login to ECR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ secrets.MANAGEMENT_ACCOUNT }}.dkr.ecr.eu-west-2.amazonaws.com
      - run: pip install requests
      - id: next-tag
        uses: nationalarchives/tdr-github-actions/.github/actions/get-next-version@27efbc03aaaa9696eea85ab7a9363d6f92733471 # v0.0.34
        with:
          repo-name: ${{ inputs.repo-name }}
      - name: Download Wiz CLI
        run: |
          curl -Lo wizcli https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64
          curl -Lo /tmp/wizcli-sha256 https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64-sha256
          curl -Lo /tmp/wizcli-sha256.sig https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64-sha256.sig
          chmod +x wizcli
      - name: Verify Wiz CLI signature
        run: |
          curl -Lo public_key.asc https://downloads.wiz.io/wizcli/public_key.asc
          gpg --import public_key.asc
          gpg --verify /tmp/wizcli-sha256.sig /tmp/wizcli-sha256
          echo "$(cat /tmp/wizcli-sha256) wizcli" | sha256sum --check
      - name: Run build-command
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          BUILD_COMMAND: ${{ inputs.build-command }}
        if: ${{ inputs.build-command }}
        run: eval "$BUILD_COMMAND"
      - name: Scan working directory with Wiz
        env:
          IMAGE_NAME: ${{ inputs.image-name }}
          WIZ_PROJECT_ID: ${{ secrets.WIZ_PROJECT_ID }}
        run: ./wizcli scan dir . --name "${IMAGE_NAME}-${{ github.run_number }}" --project "$WIZ_PROJECT_ID"
      - name: Build new image version
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          IMAGE_NAME: ${{ inputs.image-name }}
          NEXT_VERSION: ${{ steps.next-tag.outputs.next-version }}
          MANAGEMENT_ACCOUNT: ${{ secrets.MANAGEMENT_ACCOUNT }}
        run: |
          docker buildx build --output=type=docker --provenance=false --sbom=false -t "${MANAGEMENT_ACCOUNT}.dkr.ecr.eu-west-2.amazonaws.com/${IMAGE_NAME}:${NEXT_VERSION}" .
      - name: Wiz container image scan
        env:
          IMAGE_NAME: ${{ inputs.image-name }}
          NEXT_VERSION: ${{ steps.next-tag.outputs.next-version }}
          MANAGEMENT_ACCOUNT: ${{ secrets.MANAGEMENT_ACCOUNT }}
          WIZ_PROJECT_ID: ${{ secrets.WIZ_PROJECT_ID }}
        run: |
          ./wizcli scan container-image "${MANAGEMENT_ACCOUNT}.dkr.ecr.eu-west-2.amazonaws.com/${IMAGE_NAME}:${NEXT_VERSION}" --project "$WIZ_PROJECT_ID"
      - name: Push new image version to ECR
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          IMAGE_NAME: ${{ inputs.image-name }}
          NEXT_VERSION: ${{ steps.next-tag.outputs.next-version }}
          MANAGEMENT_ACCOUNT: ${{ secrets.MANAGEMENT_ACCOUNT }}
        run: |
          docker push "${MANAGEMENT_ACCOUNT}.dkr.ecr.eu-west-2.amazonaws.com/${IMAGE_NAME}:${NEXT_VERSION}"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}"
          git tag "$NEXT_VERSION"
          git push origin "$NEXT_VERSION"
      - name: Wiz Docker Tag
        env:
          IMAGE_NAME: ${{ inputs.image-name }}
          NEXT_VERSION: ${{ steps.next-tag.outputs.next-version }}
          MANAGEMENT_ACCOUNT: ${{ secrets.MANAGEMENT_ACCOUNT }}
        run: |
          ./wizcli tag "${MANAGEMENT_ACCOUNT}.dkr.ecr.eu-west-2.amazonaws.com/${IMAGE_NAME}:${NEXT_VERSION}"
