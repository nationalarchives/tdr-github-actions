name: Tag and release TDR Github Actions
on:
  push:
    branches:
      - main
jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    # Skip if the commit is from dependabot updating self-references
    if: |
      !contains(github.event.head_commit.message, 'nationalarchives/tdr-github-actions') ||
      !contains(github.event.head_commit.author.name, 'dependabot')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - id: next-tag
        uses: nationalarchives/tdr-github-actions/.github/actions/get-next-version@e7b57a3bdf7863c951cd203101c6d566986376e3 # v0.0.38
        with:
          repo-name: tdr-github-actions
      - name: Create tag and release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_VERSION: ${{ steps.next-tag.outputs.next-version }}
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git tag "$NEXT_VERSION"
          git push origin "$NEXT_VERSION"
          gh release create "$NEXT_VERSION"
