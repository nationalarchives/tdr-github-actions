# DEPRECATED: This workflow is deprecated and will be deleted after 2 weeks.
# Keeps the same workflow_call inputs so callers don't suddenly break; logs a deprecation message.
name: TDR Tag ecr image (DEPRECATED)

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      image-name:
        required: true
        type: string
      to-deploy:
        required: true
        type: string
    secrets:
      MANAGEMENT_ACCOUNT:
        required: true
      SLACK_WEBHOOK:
        required: true

permissions:
  id-token: write
  contents: write

jobs:
  deprecate:
    name: Deprecation notice
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (optional, kept for parity)
        uses: actions/checkout@v6
      - name: Print deprecation notice
        run: |
          echo "This workflow (nationalarchives/tdr-github-actions/.github/workflows/ecr_image_tag.yml) is DEPRECATED."
          echo "It will be removed on 2026-03-19."
          echo "If you depend on it, let the author know ."
          echo "Inputs received:"
          echo "  tag: ${{ inputs.tag }}"
          echo "  image-name: ${{ inputs.image-name }}"
          echo "  to-deploy: ${{ inputs.to-deploy }}"
      - name: Set deprecation output
        run: echo "deprecated=true" >> $GITHUB_OUTPUT
